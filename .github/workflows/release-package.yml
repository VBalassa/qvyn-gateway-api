name: Java and typescript package releasing

on:
#  release: # TODO: reset this after stable workflow running
#    types: [published] # TODO: reset this after stable workflow running
  push:
    branches:
      - main

jobs:
  typescript-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: |
         cd ./js
         npm ci
        shell: bash
      - run: |
          cd ./js
          npm test
        shell: bash

  typescript-publish:
    needs: typescript-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
      - run: |
          cd ./js
          npm ci
          npm run generate:types
        shell: bash
      - run: |
          cd ./js
          npm publish
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
  java-build-and-publish:
    runs-on: ubuntu-latest
    needs: typescript-publish

    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Java 21 setup
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run maven build
        run: |
          cd ./java
          mvn clean package
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: target/*.jar
          retention-days: 1